name: Build Releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Sahkoseikkailu.exe
            pyinstaller_args: >-
              --onefile
              --windowed
              --name Sahkoseikkailu

          - os: macos-latest
            artifact_name: Sahkoseikkailu.dmg
            pyinstaller_args: >-
              --onedir
              --windowed
              --name Sahkoseikkailu

    steps:
      - name: Lataa lähdekoodi
        uses: actions/checkout@v4

      - name: Asenna Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Tarkista tarvittavat tiedostot
        run: |
          python -c "from pathlib import Path; assert Path('Sahkoseikkailu_pygame.py').is_file(), 'Sahkoseikkailu_pygame.py puuttuu'"
          python -c "from pathlib import Path; assert Path('elektroniikka.py').is_file(), 'elektroniikka.py puuttuu'"

      - name: Asenna riippuvuudet
        run: python -m pip install --upgrade pip pyinstaller pygame

      - name: Rakenna sovellus
        run: >
          python -m PyInstaller
          ${{ matrix.pyinstaller_args }}
          Sahkoseikkailu_pygame.py

      - name: Nimeä Windows-versio
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item `
            "dist/Sahkoseikkailu.exe" `
            "Sahkoseikkailu.exe"

      - name: Asenna create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Paketoi macOS-versio DMG-tiedostoksi
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "Sahkoseikkailu" \
            --window-size 400 200 \
            --icon-size 100 \
            --app-drop-link 300 100 \
            "Sahkoseikkailu.dmg" \
            "dist/Sahkoseikkailu.app"

      - name: Tallenna build-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Lataa Windows-artifact
        uses: actions/download-artifact@v4
        with:
          name: Sahkoseikkailu.exe
          path: release-assets

      - name: Lataa macOS-artifact
        uses: actions/download-artifact@v4
        with:
          name: Sahkoseikkailu.dmg
          path: release-assets

      - name: Luo GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sähköseikkailu ${{ github.ref_name }}
          body: |
            ## Latausohjeet

            | Käyttöjärjestelmä | Tiedosto |
            |---|---|
            | Windows 10/11 | `Sahkoseikkailu.exe` — lataa ja tuplaklikkaa |
            | macOS | `Sahkoseikkailu.dmg` — avaa ja vedä sovellus Sovellukset-kansioon |

            Ei vaadi Pythonin asentamista.
          files: |
            release-assets/Sahkoseikkailu.exe
            release-assets/Sahkoseikkailu.dmg
          draft: false
          prerelease: false
